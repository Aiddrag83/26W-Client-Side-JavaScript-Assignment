<!-- Initial commit: create HTML structure for To-Do List app -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add commit: set meta charset -->
    <meta charset="UTF-8">

    <!-- Add commit: set page title -->
    <title>My To-Do List</title>

    <!-- Add commit: link external stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Add commit: add main heading -->
    <h1>✨ Aiden's To-Do List</h1>

    <!-- Add commit: create input section for adding tasks -->
    <div class="input-container">
        <input type="text" id="todoInput" placeholder="Enter a task...">
        <button id="addBtn">Add</button>
    </div>

    <!-- Add commit: create container for to-do items -->
    <ul id="todoList"></ul>

    <!-- Add commit: link JavaScript functionality -->
    <script src="script.js"></script>
</body>
</html>
